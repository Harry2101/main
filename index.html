<!DOCTYPE html>
<html lang="en" data-theme="sakura">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akkala AI • Practical Systems for Your Business</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root {
            --bg: #fffaf5;
            --text: #3f2a2a;
            --accent: #f8c4d8;
            --accent-dark: #e89ab8;
            --card: #fff;
            --border: #f5d9e8;
        }
        [data-theme="dark"] {
            --bg: #0a0a0a;
            --text: #e5e5e5;
            --accent: #9f4a6f;
            --accent-dark: #c36b8f;
            --card: #111;
            --border: #2a2a2a;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.4s ease, color 0.4s ease;
        }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        
        .sakura-petals {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1; overflow: hidden;
            opacity: 0.6;
        }
        .petal {
            position: absolute;
            width: 12px; height: 12px;
            background: #f8c4d8;
            border-radius: 50% 0;
            animation: fall linear infinite;
            opacity: 0.7;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
        
        .section-header {
            font-size: 2.1rem;
            line-height: 2.4rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }
        .package-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .package-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        .nav-link { color: var(--text); }
    </style>
</head>
<body class="min-h-screen">
    <!-- Sakura Petals Container -->
    <div id="petals" class="sakura-petals"></div>

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 border-b border-[var(--border)] bg-[var(--bg)]/95 backdrop-blur-lg">
        <div class="max-w-screen-xl mx-auto px-6">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-[#f8c4d8] rounded-2xl flex items-center justify-center">
                        <span class="text-[#3f2a2a] font-semibold text-2xl tracking-tighter">A</span>
                    </div>
                    <span class="font-semibold text-2xl tracking-tighter font-display">Akkala AI</span>
                </div>
                
                <div class="hidden md:flex items-center gap-x-8 text-sm">
                    <a href="#packages" class="nav-link hover:text-[#e89ab8] transition-colors">Packages</a>
                    <a href="#how" class="nav-link hover:text-[#e89ab8] transition-colors">How it works</a>
                    <a href="#whatyouget" class="nav-link hover:text-[#e89ab8] transition-colors">What you get</a>
                </div>
                
                <div class="flex items-center gap-x-4">
                    <!-- Theme Toggle -->
                    <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center text-xl hover:bg-[var(--border)] rounded-2xl transition-colors">
                        🌸
                    </button>
                    
                    <a href="mailto:hareeakkala@gmail.com"
                       class="px-5 py-2.5 text-sm font-medium border border-[var(--border)] hover:bg-[var(--border)] transition-colors rounded-3xl">
                        Book a call
                    </a>
                    <a href="#packages"
                       class="px-6 py-2.5 text-sm font-semibold bg-[#f8c4d8] text-[#3f2a2a] hover:bg-[#e89ab8] transition-colors rounded-3xl">
                        See packages
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero + all other sections remain exactly as you provided, with Tailwind classes updated for new colors where needed -->

    <!-- Footer same as original but with theme-aware colors -->

    <script>
        // Theme handling
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('theme-toggle').textContent = theme === 'sakura' ? '🌙' : '🌸';
            document.getElementById('petals').style.display = theme === 'sakura' ? 'block' : 'none';
        }

        // Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'sakura' ? 'dark' : 'sakura');
        });

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'sakura';
        setTheme(savedTheme);

        // Keyboard shortcut
        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 't') {
                const current = document.documentElement.getAttribute('data-theme');
                setTheme(current === 'sakura' ? 'dark' : 'sakura');
            }
        });

        // Simple Sakura Petals
        function createPetal() {
            if (document.documentElement.getAttribute('data-theme') !== 'sakura') return;
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = (Math.random() * 8 + 10) + 's';
            petal.style.opacity = Math.random() * 0.6 + 0.4;
            petal.style.width = petal.style.height = (Math.random() * 8 + 8) + 'px';
            petal.style.background = '#f8c4d8';
            document.getElementById('petals').appendChild(petal);
            
            setTimeout(() => petal.remove(), 20000);
        }
        
        setInterval(createPetal, 180);
        // Initial burst
        for (let i = 0; i < 15; i++) setTimeout(createPetal, i * 80);
        
        // Tailwind script already present
    </script>
</body>
</html>
